name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    name: Type-check & Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run TypeScript check
        run: npx tsc --noEmit
        env:
          MONGODB_URI: mongodb://localhost:27017/ci-test
          JWT_SECRET: ci-only-secret
          GROQ_API_KEY: ci-placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      - name: Build
        run: npm run build
        env:
          MONGODB_URI: mongodb://localhost:27017/ci-test
          JWT_SECRET: ci-only-secret
          GROQ_API_KEY: ci-placeholder
          NEXT_PUBLIC_APP_URL: http://localhost:3000
